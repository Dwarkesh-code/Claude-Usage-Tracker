<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Usage Tracker</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>

    <!-- ── Main view ── -->
    <div id="main-view">

      <div class="usage-bar" id="usage-bar">
        <div class="metric">
          <span class="label">Session</span>
          <span class="value" id="session-percent">0%</span>
          <div class="progress-bar">
            <div class="progress-fill" id="session-progress-fill"></div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="metric-center">
          <span class="traffic off-peak" id="traffic-indicator">OFF-PEAK</span>
          <span class="value" id="reset-in" style="font-size:12px;color:#3b82f6;">—</span>
        </div>

        <div class="divider"></div>

        <div class="metric" style="align-items:flex-end;">
          <span class="label">Context</span>
          <span class="value" id="chat-context-percent">—</span>
          <div class="progress-bar" style="width: 100%;">
            <div class="progress-fill" id="chat-context-progress-fill"></div>
          </div>
        </div>
      </div>

      <!-- Peak hours info -->
      <div class="h-divider"></div>
      <div id="peak-hours-info"></div>

      <!-- Session History -->
      <div id="history-section" style="display:none;">
        <div class="h-divider"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span class="label" style="margin-bottom:0;">Recent Sessions</span>
        </div>
        <div id="history-list"></div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <span class="footer-ver">v2.1.0</span>
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
          </svg>
        </button>
      </div>

    </div>

    <!-- ── Settings panel ── -->
    <div id="settings-view" style="display:none;">
      <div class="settings-header">
        <button id="btn-back" class="icon-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
          </svg>
        </button>
        <span class="settings-title">Settings</span>
      </div>

      <!-- Session history section -->
      <div class="s-section">
        <div class="s-row">
          <span class="s-label">Session History</span>
          <button id="s-clear-history" class="s-btn s-btn-danger">Clear All</button>
        </div>
      </div>

    </div>

    <script src="popup_usage.js"></script>
  </body>
</html>
